# ============================================================
# 费率三层用法速查
# ============================================================
funding_layers:
  layer_1_arb:
    name: "套利层"
    method: "Delta中性纯收费率"
    when: "费率持续同向3天+ AND 震荡市"
    risk: "对冲不完全"
    example: "开空收正费率 + 开1/3仓多对冲"

  layer_2_signal:
    name: "信号层"
    method: "极端费率→拥挤→反转"
    when: "费率极端(>2σ) AND 有反向催化剂"
    risk: "极端持续更久"
    example: "费率极端正→开空(赌多头拥挤→踩踏)"

  layer_3_income:
    name: "增收层"
    method: "持仓方向同向额外收息"
    when: "趋势方向与费率方向一致"
    risk: "趋势+费率同时反转"
    example: "多头趋势+负费率→做多收息双重收益"

# ============================================================
# OKX工具命令速查
# ============================================================
tool_commands:
  spot_grid: 'okx bot grid create --instId {instId} --algoOrdType grid --maxPx {upper} --minPx {lower} --gridNum {grids} --quoteSz {quoteSz} --runType 1 --tag "{tag}" --profile dreamdemo'
  contract_grid_long: 'okx bot grid create --instId {instId} --algoOrdType contract_grid --maxPx {upper} --minPx {lower} --gridNum {grids} --direction long --lever {lever} --sz {margin} --runType 1 --tag "{tag}" --profile dreamdemo'
  contract_grid_short: 'okx bot grid create --instId {instId} --algoOrdType contract_grid --maxPx {upper} --minPx {lower} --gridNum {grids} --direction short --lever {lever} --sz {margin} --runType 1 --tag "{tag}" --profile dreamdemo'
  dca_long: 'okx bot dca create --algoOrdType contract_dca --instId {instId} --direction long --initOrdAmt {initAmt} --maxSafetyOrds {safetyOrds} --safetyOrdAmt {safetyAmt} --pxSteps {pxSteps} --tpPct {tpPct} --lever {lever} --triggerStrategy instant --tag "{tag}" --profile dreamdemo'
  dca_short: 'okx bot dca create --algoOrdType contract_dca --instId {instId} --direction short --initOrdAmt {initAmt} --maxSafetyOrds {safetyOrds} --safetyOrdAmt {safetyAmt} --pxSteps {pxSteps} --tpPct {tpPct} --lever {lever} --triggerStrategy instant --tag "{tag}" --profile dreamdemo'
  swap_long: 'okx swap place --instId {instId} --side buy --ordType market --sz {sz} --posSide long --tdMode isolated --lever {lever} --profile dreamdemo'
  swap_short: 'okx swap place --instId {instId} --side sell --ordType market --sz {sz} --posSide short --tdMode isolated --lever {lever} --profile dreamdemo'
  tp_sl: 'okx swap algo-place --instId {instId} --side {closeSide} --ordType conditional --sz {sz} --posSide {posSide} --tpTriggerPx {tpPx} --tpOrdPx -1 --slTriggerPx {slPx} --slOrdPx -1 --profile dreamdemo'
  bot_list: 'okx bot list --profile dreamdemo'
  bot_stop: 'okx bot stop --algoId {algoId} --profile dreamdemo'
  positions: 'okx swap positions --profile dreamdemo'
  balance: 'okx account balance --profile dreamdemo'

# ============================================================
# OKX踩坑速查(策略库内置)
# ============================================================
okx_pitfalls:
  - "CLI命令是okx非okx-trade"
  - "funding-rate命令路由: okx market funding-rate(非swap!)"
  - "bar小写 | sz整手 | algo多头TP/SL: side=sell"
  - "posSide必需: 多头也必须指定--posSide long"
  - "合约网格sz需≥$126保证金 | gridNum>20报51340"
  - "现货网格quoteSz≥15.5U | DCA需pxStepsMult+volMult"
  - "⚠️ tpPct方向差异: LONG=整数(2=2%), SHORT=小数(0.02=2%)!"
  - "签名timestamp: ISO8601毫秒(报50112) | GET签名: query拼入path(报50113)"
  - "⚠️ 期权需先激活! 报51198→网页点期权合约激活(模拟盘同理)"
  - "⚠️ 期权instId用短横线: BTC-USD-260515-78000-C (非下划线_UM格式)"
  - "⚠️ BTC期权1张=1BTC，权利金最低$200+，小账户(<$10K)不建议"
  - "⚠️ 期权tdMode: 需cross/isolated模式，简单模式cash可能报51000"
