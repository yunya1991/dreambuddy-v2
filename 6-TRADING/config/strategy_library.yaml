# strategy_library.yaml v3.3
# 7种Regime × 策略+工具 精炼匹配库
# 设计原则: 直白命名 | 收益预期排序 | 总仓位≤20% | A4快速索引
# 替代: v2.2的22条概念策略 → 本文件为唯一策略源
# 对接: dream-strategy-parser / A4战术验证
# v3.1新增: 10条大师历史实践知识策略(蒸馏自8位经典交易大师)
# v3.2新增: 三类知识源体系 + 实践策略库(5_practice_strategies)
# v3.3新增: 三层索引体系(v7.0)对接 | 工具索引字段 | 跨资产字段

_meta:
  version: "3.3.0"
  updated: "2026-04-28"
  total_strategies: 48
  total_regimes: 7
  master_strategies: 10  # 大师蒸馏策略数
  practice_strategies: 3  # 实践验证策略数
  position_cap: 20%  # 多策略并行总仓位上限
  priority_rule: "收益预期从高到低"
  naming_rule: "直白描述型，禁止概念命名"
  option_scope: "BTC为主，ETH非必要不入，其余不做"
  
  # ⭐ v7.0三层索引检索优先级 (必须严格按顺序)
  retrieval_priority_tier1:
    - tier: "1st"
      source: "master_strategies"
      description: "大师策略(最高优先)"
      criteria: "master_*前缀策略，priority=0优先"
    - tier: "2nd"  
      source: "online_strategies"
      description: "联网搜索策略(次优先)"
      criteria: "Tavily/Odaily/Agent-Reach实时搜索"
    - tier: "3rd"
      source: "practice_strategies"
      description: "实践经验策略(兜底)"
      criteria: "P-S级策略，verifications≥3"

  # ⭐ v7.0工具索引字段
  tool_index:
    regime_matrix:
      RANGE_BOUND: ["grid", "farming"]
      TREND_DOWN: ["dca", "swap"]
      TREND_STRONG_UP: ["swap", "dca"]
      COMPRESSION: ["option", "swap"]
      FUNDING_EXTREME: ["farming", "grid"]
      MACRO_DIVERGE: ["cross_asset", "swap"]
      UNCLEAR: ["swap", "grid"]

  # ⭐ v7.0跨资产设计字段
  cross_asset_support:
    instruments:
      - "BTC-USDT-SWAP"  # 主交易标的
      - "ETH-USDT-SWAP"  # 备选标的
      - "XAUT-USDT"      # 黄金现货(避险)
      - "COIN-USDT-SWAP" # Coinbase股票(行业)
      - "SOL-USDT-SWAP"   # 高波动备选
    macro_correlation:
      BTC_XAUT: "常规正相关，避险时负相关"
      BTC_COIN: "行业共振，正相关"
      BTC_ETH: "高相关，同涨同跌"
      BTC_SOL: "中高相关，波动更大"

# ============================================================
# 7种市场状态定义
# ============================================================
regimes:
  TREND_STRONG_UP:
    name: "强上涨趋势"
    detect: "周线+日线+1H三屏多 + MA7>MA25>MA99 + ATR扩张"
    si_range: [35, 80]
    bias: LONG

  TREND_UP:
    name: "温和上涨"
    detect: "日线多+1H偏多 + MA7>MA25 + ATR正常"
    si_range: [20, 34]
    bias: LONG

  RANGE_BOUND:
    name: "震荡区间"
    detect: "三屏分化 + MA7≈MA25 + ATR收缩 + 支撑阻力明确"
    si_range: [15, 25]
    bias: NEUTRAL

  COMPRESSION:
    name: "压缩蓄力"
    detect: "ATR持续收窄至历史低位 + 布林带收窄 + OI增加 + 波动率极低"
    si_range: [10, 20]
    bias: WAIT
    notes: "暴风雨前的宁静，方向选择在即"

  TRANSITION:
    name: "过渡转换"
    detect: "Regime刚切换(3日内) + 旧趋势衰减+新趋势未确认 + 信号矛盾"
    si_range: [10, 25]
    bias: WAIT
    notes: "旧状态已破，新状态未立，轻仓试探"

  TREND_DOWN:
    name: "下行趋势"
    detect: "日线空+1H偏空 + MA7<MA25<MA99 + 价格低于EMA60"
    si_range: [5, 15]
    bias: SHORT

  EXTREME:
    name: "极端行情"
    detect: "单日涨跌>5% + FGI<15或>85 + 费率极端 + 流动性枯竭"
    si_range: [0, 100]
    bias: CONTRARIAN
    notes: "恐慌=机会，贪婪=危险"

# ============================================================
# 策略库: 按Regime分组，每组按收益预期从高到低排序
# ============================================================
strategies:
  # ──────────────────────────────────────────────────────
  # R1: TREND_STRONG_UP — 强上涨趋势
  # 核心逻辑: 趋势是你朋友，跟着走别逆着干
  # ──────────────────────────────────────────────────────
  - id: trend_long_margin
    name: "趋势跟随做多(合约杠杆)"
    regime: TREND_STRONG_UP
    priority: 1
    expected_return: "高"
    tool: swap
    description: "三屏共振多头，杠杆合约顺势做多，突破加仓"
    trigger: "regime==TREND_STRONG_UP AND SI≥35 AND Edge>0"
    entry: "市价开多 + 突破前高加仓"
    exit: "trailing_stop 3% + 日线MA7破位止盈"
    risk: "趋势反转回撤"
    position: 10%
    leverage: 3-5x
    instruments: ["BTC-USDT-SWAP", "ETH-USDT-SWAP"]
    command: 'okx swap place --instId {instId} --side buy --ordType market --sz {sz} --posSide long --tdMode isolated --lever {lever} --profile dreamdemo'

  - id: trend_long_option_call
    name: "看涨期权杠杆放大"
    regime: TREND_STRONG_UP
    priority: 2
    expected_return: "极高(有限亏损)"
    tool: option
    description: "买入虚值看涨期权，以小博大，最大亏损=权利金"
    trigger: "regime==TREND_STRONG_UP AND SI≥40 AND volatility_rank<70"
    entry: "买入BTC虚值5-10%看涨期权，期限2-4周"
    exit: "到期前1周评估是否行权/平仓，或目标价位平仓"
    risk: "时间价值衰减，趋势不及预期"
    position: 3%
    leverage: "N/A(期权自带杠杆)"
    instruments: ["BTC-USD-UM"]  # 仅BTC期权
    notes: "⚠️仅BTC，ETH非必要不入 | ⚠️需账户≥$15K(1张=1BTC权利金$500+)"
    command: 'okx option place --instId {optionInstId} --tdMode cross --side buy --ordType limit --sz 1 --px {px} --profile dreamdemo'

  - id: trend_long_dca
    name: "趋势定投加仓"
    regime: TREND_STRONG_UP
    priority: 3
    expected_return: "中高"
    tool: dca
    description: "合约DCA沿着趋势方向分批建仓，回踩加仓"
    trigger: "regime==TREND_STRONG_UP AND SI≥30"
    entry: "回踩MA25附近触发DCA，3-5档加仓"
    exit: "tpPct 3-5%"
    risk: "趋势末期追高"
    position: 5%
    leverage: 2-3x
    instruments: ["BTC-USDT-SWAP"]
    command: 'okx bot dca create --algoOrdType contract_dca --instId {instId} --direction long --initOrdAmt 10 --maxSafetyOrds 5 --safetyOrdAmt 12 --pxSteps 0.015 --tpPct 3 --lever {lever} --triggerStrategy instant --tag "a4_trend_dca" --profile dreamdemo'

  - id: trend_grid_long
    name: "多头合约网格(趋势增利)"
    regime: TREND_STRONG_UP
    priority: 4
    expected_return: "中"
    tool: grid
    description: "方向性网格，只做多单，趋势中高抛低吸增厚收益"
    trigger: "regime==TREND_STRONG_UP AND 区间宽度>5%"
    entry: "设定支撑~阻力区间，long方向合约网格"
    exit: "bot止盈或手动平仓"
    risk: "趋势加速突破上轨后空仓"
    position: 5%
    leverage: 2-3x
    instruments: ["BTC-USDT-SWAP", "ETH-USDT-SWAP"]
    command: 'okx bot grid create --instId {instId} --algoOrdType contract_grid --maxPx {upper} --minPx {lower} --gridNum {grids} --direction long --lever {lever} --sz {margin} --runType 1 --tag "a4_trend_grid" --profile dreamdemo'

  - id: trend_funding_long
    name: "费率+趋势双重收入(做多收息)"
    regime: TREND_STRONG_UP
    priority: 5
    expected_return: "中(叠加费率)"
    tool: farming
    description: "趋势做多+负费率时额外收息，正费率则纯趋势不收息"
    trigger: "regime==TREND_STRONG_UP AND funding_rate<0"
    entry: "开多仓 + 持仓收负费率(空头付费率给多头)"
    exit: "费率翻正评估是否继续持有"
    risk: "费率翻转+趋势反转双重打击"
    position: 5%
    leverage: 2x
    instruments: ["BTC-USDT-SWAP"]
    notes: "费率三层用法: 增收层(同向收费率)"

  # ──────────────────────────────────────────────────────
  # R2: TREND_UP — 温和上涨
  # 核心逻辑: 趋势偏多但不强，稳着来
  # ──────────────────────────────────────────────────────
  - id: mild_trend_long
    name: "温和做多(低杠杆合约)"
    regime: TREND_UP
    priority: 1
    expected_return: "中高"
    tool: swap
    description: "日线偏多但不够强，低杠杆做多，严格止损"
    trigger: "regime==TREND_UP AND SI≥20 AND Edge>0"
    entry: "回踩MA7/MA25支撑做多"
    exit: "止损1.5% + 止盈3-5%"
    risk: "假突破变震荡"
    position: 8%
    leverage: 2x
    instruments: ["BTC-USDT-SWAP"]
    command: 'okx swap place --instId {instId} --side buy --ordType market --sz {sz} --posSide long --tdMode isolated --lever 2 --profile dreamdemo'

  - id: mild_grid_long
    name: "偏多合约网格"
    regime: TREND_UP
    priority: 2
    expected_return: "中"
    tool: grid
    description: "趋势偏多但力度不够，用多头网格兼顾方向+区间"
    trigger: "regime==TREND_UP AND 区间明确"
    entry: "long方向合约网格，区间偏上设"
    exit: "bot自动止盈"
    risk: "趋势变震荡或下跌"
    position: 5%
    leverage: 2x
    instruments: ["BTC-USDT-SWAP"]
    command: 'okx bot grid create --instId {instId} --algoOrdType contract_grid --maxPx {upper} --minPx {lower} --gridNum {grids} --direction long --lever 2 --sz {margin} --runType 1 --tag "a4_mild_grid" --profile dreamdemo'

  - id: mild_dca_long
    name: "逢低定投做多"
    regime: TREND_UP
    priority: 3
    expected_return: "中"
    tool: dca
    description: "温和上涨中用DCA分批低吸，避免追高"
    trigger: "regime==TREND_UP AND SI≥20"
    entry: "DCA 4档，pxSteps 1.5%"
    exit: "tpPct 2-3%"
    risk: "上涨不及预期变横盘"
    position: 5%
    leverage: 2x
    instruments: ["BTC-USDT-SWAP"]
    command: 'okx bot dca create --algoOrdType contract_dca --instId {instId} --direction long --initOrdAmt 8 --maxSafetyOrds 4 --safetyOrdAmt 10 --pxSteps 0.015 --tpPct 2 --lever 2 --triggerStrategy instant --tag "a4_mild_dca" --profile dreamdemo'

  - id: mild_spot_accumulate
    name: "现货逢低建仓"
    regime: TREND_UP
    priority: 4
    expected_return: "中低(稳健)"
    tool: spot
    description: "温和上涨中分批买入现货，长期持有"
    trigger: "regime==TREND_UP AND FGI<50"
    entry: "回调至支撑位买入现货"
    exit: "趋势变空时卖出"
    risk: "买入后继续下跌"
    position: 5%
    leverage: "1x(无杠杆)"
    instruments: ["BTC-USDT", "ETH-USDT"]
    command: 'okx swap place --instId {instId} --side buy --ordType limit --sz {sz} --px {px} --tdMode cash --profile dreamdemo'

  # ──────────────────────────────────────────────────────
  # R3: RANGE_BOUND — 震荡区间
  # 核心逻辑: 不猜方向，赚区间的钱
  # ──────────────────────────────────────────────────────
  - id: range_neutral_grid
    name: "中性双向网格"
    regime: RANGE_BOUND
    priority: 1
    expected_return: "中(稳定)"
    tool: grid
    description: "震荡区间首选！不判断方向，高抛低吸赚价差"
    trigger: "regime==RANGE_BOUND AND 区间宽度>3%"
    entry: "现货网格或合约中性网格"
    exit: "bot自动运行，区间破位手动停"
    risk: "区间突破后单边亏损"
    position: 5%
    leverage: "1x(现货) / 2x(合约)"
    instruments: ["BTC-USDT", "BTC-USDT-SWAP"]
    command_spot: 'okx bot grid create --instId {instId} --algoOrdType grid --maxPx {upper} --minPx {lower} --gridNum {grids} --quoteSz {quoteSz} --runType 1 --tag "a4_range_grid" --profile dreamdemo'
    command_contract: 'okx bot grid create --instId {instId} --algoOrdType contract_grid --maxPx {upper} --minPx {lower} --gridNum {grids} --direction long --lever 2 --sz {margin} --runType 1 --tag "a4_range_cgrid" --profile dreamdemo'

  - id: range_farming_income
    name: "费率+网格双重收入"
    regime: RANGE_BOUND
    priority: 2
    expected_return: "中(双重叠加)"
    tool: farming+grid
    description: "震荡中持仓收负费率+网格赚区间，双份收入"
    trigger: "regime==RANGE_BOUND AND funding_rate<0"
    entry: "开多收费率 + 同时开网格"
    exit: "费率翻正或区间破位"
    risk: "费率翻转+破位双重亏损"
    position: 5%
    leverage: 2x
    instruments: ["BTC-USDT-SWAP"]
    notes: "费率三层用法: 增收层(同向)+套利层(Delta中性)"

  - id: range_dca_bottom
    name: "区间下部DCA低吸"
    regime: RANGE_BOUND
    priority: 3
    expected_return: "中低"
    tool: dca
    description: "在区间下部用DCA分批买入，反弹止盈"
    trigger: "regime==RANGE_BOUND AND price<区间中轴"
    entry: "DCA做多，3-4档，pxSteps 1%"
    exit: "tpPct 1.5-2%"
    risk: "跌破区间下沿"
    position: 5%
    leverage: 2x
    instruments: ["BTC-USDT-SWAP"]
    command: 'okx bot dca create --algoOrdType contract_dca --instId {instId} --direction long --initOrdAmt 8 --maxSafetyOrds 4 --safetyOrdAmt 10 --pxSteps 0.01 --tpPct 1.5 --lever 2 --triggerStrategy instant --tag "a4_range_dca" --profile dreamdemo'

  - id: range_funding_signal
    name: "费率极端反转信号"
    regime: RANGE_BOUND
    priority: 4
    expected_return: "中(信号驱动)"
    tool: farming
    description: "震荡中费率极端→拥挤交易→反转信号，反向开仓"
    trigger: "regime==RANGE_BOUND AND abs(funding_rate)>0.01"
    entry: "费率极端正→开空，费率极端负→开多"
    exit: "费率回归中性时止盈"
    risk: "费率极端持续更久"
    position: 3%
    leverage: 2x
    instruments: ["BTC-USDT-SWAP"]
    notes: "费率三层用法: 信号层(极端→反转)"

  - id: range_funding_arb
    name: "Delta中性费率套利"
    regime: RANGE_BOUND
    priority: 5
    expected_return: "低(但稳定)"
    tool: farming
    description: "震荡中开空收正费率+开小仓多对冲，纯吃费率"
    trigger: "regime==RANGE_BOUND AND funding_rate>0.0003 AND 持续3天+"
    entry: "开空收费率 + 开1/3仓多对冲上行风险"
    exit: "费率收窄至0.0001以下"
    risk: "对冲不完全+单边突破"
    position: 5%
    leverage: 2x
    instruments: ["BTC-USDT-SWAP"]
    notes: "费率三层用法: 套利层(Delta中性纯收费率)"

  # ──────────────────────────────────────────────────────
  # R4: COMPRESSION — 压缩蓄力
  # 核心逻辑: 暴风雨前布局，方向出来后加码
  # ──────────────────────────────────────────────────────
  - id: comp_straddle_option
    name: "跨式期权做多波动率"
    regime: COMPRESSION
    priority: 1
    expected_return: "极高(方向无关)"
    tool: option
    description: "压缩期买入同执行价看涨+看跌，方向出来后一边大赚"
    trigger: "regime==COMPRESSION AND ATR<历史20%分位 AND 布林带收窄"
    entry: "买入BTC ATM跨式(Call+Put同执行价)，期限2-4周"
    exit: "方向突破后平掉亏损端，持有盈利端；或到期"
    risk: "继续压缩，时间价值衰减"
    position: 3%
    leverage: "N/A"
    instruments: ["BTC-USD-UM"]
    notes: "⚠️仅BTC期权，这是压缩期最佳策略 | ⚠️需账户≥$25K(跨式权利金$1000+)"

  - id: comp_pending_both
    name: "双向挂单捕捉突破"
    regime: COMPRESSION
    priority: 2
    expected_return: "高"
    tool: swap
    description: "在压缩区间上下沿各挂突破单，谁先触发跟谁"
    trigger: "regime==COMPRESSION AND 支撑阻力明确"
    entry: "阻力位上0.5%挂多单 + 支撑位下0.5%挂空单"
    exit: "突破方向trailing 3% + 未触发端取消"
    risk: "假突破两头打"
    position: 5%
    leverage: 2-3x
    instruments: ["BTC-USDT-SWAP"]
    command_long: 'okx swap place --instId {instId} --side buy --ordType conditional --sz {sz} --posSide long --tdMode isolated --lever 3 --slTriggerPx {slPx} --profile dreamdemo'
    command_short: 'okx swap place --instId {instId} --side sell --ordType conditional --sz {sz} --posSide short --tdMode isolated --lever 3 --slTriggerPx {slPx} --profile dreamdemo'

  - id: comp_grid_narrow
    name: "窄区间网格收粮"
    regime: COMPRESSION
    priority: 3
    expected_return: "中低(等待期收入)"
    tool: grid
    description: "压缩区间内开窄网格，等突破前先赚点小区间利润"
    trigger: "regime==COMPRESSION AND 区间宽度2-4%"
    entry: "窄区间现货网格或低杠杆合约网格"
    exit: "区间突破立即手动停止网格"
    risk: "突破后网格单边持仓"
    position: 3%
    leverage: 1-2x
    instruments: ["BTC-USDT", "BTC-USDT-SWAP"]

  - id: comp_dca_probe
    name: "小幅DCA试水"
    regime: COMPRESSION
    priority: 4
    expected_return: "中"
    tool: dca
    description: "压缩期小量DCA做多(赌向上突破)，失败止损小"
    trigger: "regime==COMPRESSION AND SI>15(偏多)"
    entry: "极小量DCA，2档，pxSteps 1%"
    exit: "tpPct 2% + 破支撑止损"
    risk: "向下突破亏损"
    position: 3%
    leverage: 2x
    instruments: ["BTC-USDT-SWAP"]

  # ──────────────────────────────────────────────────────
  # R5: TRANSITION — 过渡转换
  # 核心逻辑: 方向不明，轻仓多策略试探
  # ──────────────────────────────────────────────────────
  - id: trans_multi_probe
    name: "多策略轻仓试探"
    regime: TRANSITION
    priority: 1
    expected_return: "中(分散)"
    tool: multi
    description: "同时运行2-3个小仓策略，看哪个方向先确认"
    trigger: "regime==TRANSITION AND 信号矛盾"
    entry: "小仓做多2% + 小仓做空2% + 小网格3%"
    exit: "方向确认后保留顺向仓，平掉逆向仓"
    risk: "方向迟迟不明，手续费消耗"
    position: "总计7%(3%+2%+2%)"
    leverage: 2x
    instruments: ["BTC-USDT-SWAP"]
    notes: "A4最常用策略！C9多维度试探要求"

  - id: trans_funding_wait
    name: "费率观察+等待"
    regime: TRANSITION
    priority: 2
    expected_return: "低(但安全)"
    tool: farming
