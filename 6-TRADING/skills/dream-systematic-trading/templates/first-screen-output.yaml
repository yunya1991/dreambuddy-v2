# 第一屏输出模板 (First Screen Output Template)

> **模板版本**: v3.0
> **最后更新**: 2026-05-16

---

## 一、模板说明

### 1.1 用途

**此模板用于**: 第一屏（周线决策）的输出格式化

### 1.2 使用方式

```yaml
使用方式:

  1. 将模板复制到输出文件
  2. 替换所有 [?] 为实际值
  3. 删除未使用的选项（如 [是/否] → 选择其中一个）
```

---

## 二、第一屏输出模板

### 2.1 完整模板

```yaml
第一屏输出 (周线决策):

  市场状态:
    周线趋势: [?] # [多头/空头/震荡]
    周线评分: [?] # [0-100]
    波动率: [?]% # 周线波动率
    趋势动力: [?] # [强/中/弱]
    
  策略选择:
    方向: [?] # [做多/做空/观望]
    策略类型: [?] # [合约马丁/现货马丁]
    理由: [?] # 基于A1-A3分析
    
  资金管理:
    基础仓位: [?]% # 合约马丁20% / 现货马丁25%
    最大杠杆: [?]x # 合约马丁≤5x / 现货马丁≤2x
    最大回撤约束: ≤ 20% # ★ 核心新增
    
  风险提示:
    仓位上限: [?]% # 累计马丁仓位 ≤ 账户60%
    风险预算: [?]% # 单层级最大回撤 ≤ 20%
    关键风险点: [?] # 周线阻力位/支撑位/宏观风险
    
  有效周期:
    开始: [?] # [本周]
    结束: [?] # [下周] (约1-2周)
```

### 2.2 示例填充

```yaml
第一屏输出示例 (BTC/USDT, 2026-05-16):

  市场状态:
    周线趋势: 多头
    周线评分: 75
    波动率: 4.2%
    趋势动力: 强
    
  策略选择:
    方向: 做多
    策略类型: 合约马丁
    理由: 周线EMA多头排列 + MACD金叉 + BTC ETF资金持续流入
    
  资金管理:
    基础仓位: 20% # 合约马丁
    最大杠杆: 3x
    最大回撤约束: ≤ 20% # ★ 核心新增
    
  风险提示:
    仓位上限: 60% # 累计马丁仓位 ≤ 账户60%
    风险预算: 20% # 单层级最大回撤 ≤ 20%
    关键风险点: 周线阻力位 $85,000 / 美联储加息预期
    
  有效周期:
    开始: 2026-05-16 (本周)
    结束: 2026-05-23 (下周)
```

---

## 三、模板字段说明

### 3.1 字段说明表

| 字段 | 类型 | 必填 | 说明 |
|:------|:-----|:-----|:-----|
| **周线趋势** | 枚举 | 是 | 多头/空头/震荡 |
| **周线评分** | 数值 | 是 | 0-100 |
| **波动率** | 数值 | 是 | 周线波动率 (%) |
| **趋势动力** | 枚举 | 是 | 强/中/弱 |
| **方向** | 枚举 | 是 | 做多/做空/观望 |
| **策略类型** | 枚举 | 是 | 合约马丁/现货马丁 |
| **理由** | 字符串 | 是 | 基于A1-A3分析 |
| **基础仓位** | 数值 | 是 | 合约马丁20% / 现货马丁25% |
| **最大杠杆** | 数值 | 是 | 合约马丁≤5x / 现货马丁≤2x |
| **最大回撤约束** | 字符串 | 是 | ≤ 20% ★ 核心新增 |
| **仓位上限** | 数值 | 是 | ≤ 账户60% |
| **风险预算** | 数值 | 是 | ≤ 20% |
| **关键风险点** | 字符串 | 否 | 周线阻力位/支撑位/宏观风险 |
| **有效周期-开始** | 日期 | 是 | YYYY-MM-DD |
| **有效周期-结束** | 日期 | 是 | YYYY-MM-DD |

---

## 四、模板使用流程

### 4.1 使用步骤

```
模板使用步骤:

  步骤1: 复制模板
    → 将本模板复制到输出文件
    
  步骤2: 填充字段
    → 将 [?] 替换为实际值
    → 删除未使用的选项（如 [是/否] → 选择其中一个）
    
  步骤3: 验证输出
    → 检查所有必填字段是否已填充
    → 检查数值是否在合理范围内
    → 检查枚举值是否合法
    
  步骤4: 输出结果
    → 将填充后的模板作为第一屏输出
    → 传递到第二屏
```

### 4.2 验证规则

```yaml
验证规则:

  周线评分:
    • 范围: 0-100
    • 必填: 是
    
  方向:
    • 枚举: 做多/做空/观望
    • 必填: 是
    • 一致性: 必须与A1-A3分析一致
    
  策略类型:
    • 枚举: 合约马丁/现货马丁
    • 必填: 是
    • 一致性: 必须与第一屏选择一致
    
  最大回撤约束:
    • 固定值: ≤ 20% ★ 核心新增
    • 必填: 是
    • 监控: 实时计算当前回撤
    
  有效周期:
    • 格式: YYYY-MM-DD
    • 必填: 是
    • 范围: 约1-2周
```

