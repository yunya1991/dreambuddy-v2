# 第三屏输出模板 (Third Screen Output Template)

> **模板版本**: v3.0
> **最后更新**: 2026-05-16

---

## 一、模板说明

### 1.1 用途#

**此模板用于**: 第三屏（实时监控）的输出格式化

### 1.2 使用方式#

```yaml
使用方式:

  1. 将模板复制到输出文件
  2. 替换所有 [?] 为实际值
  3. 删除未使用的选项（如 [是/否] → 选择其中一个）
```

---

## 二、第三屏输出模板#

### 2.1 完整模板#

```yaml
第三屏输出 (实时监控):

  当前仓位:
    方向: [?] # [多/空]
    入场价: [$??,???]
    当前价: [$??,???]
    盈亏: [+/- $???,??? (%)]
    实际仓位: [?]%
    最大回撤: [?]% # (必须 ≤20%)
    
  监控状态:
    A6监控: [?] # [正常/异常/风险]
    A6情报评分: [?] # [0-100]
    A9风险等级: [?] # [低/中/高]
    A4验证结果: [?] # [PASS/FAIL]
    
  调整信号:
    [?] # [无/加仓/止盈调整/止损调整/紧急离场]
    
  执行动作:
    • 类型: [?] # [无/挂单/撤单/调整止盈止损/平仓]
    • 价格: [$??,???]
    • 数量: [?] # 根据实际仓位计算
    • 委托类型: [?] # [市价单/限价单/止损限价单/移动止损单]
    
  ★ 最大回撤监控: ★ 核心新增
    当前回撤: [?]% # (必须 ≤20%)
    警告线: 15%
    强制止损线: 20%
    应对措施: [?] # [正常/警告-暂停加仓/强制止损-全部平仓]
```

### 2.2 示例填充#

```yaml
第三屏输出示例 (BTC/USDT, 2026-05-16):

  当前仓位:
    方向: 多头
    入场价: $79,800
    当前价: $82,500
    盈亏: +$2,700 (+3.4%)
    实际仓位: 20%
    最大回撤: [2.5%] # (必须 ≤20%)
    
  监控状态:
    A6监控: 正常
    A6情报评分: 75
    A9风险等级: 低
    A4验证结果: PASS
    
  调整信号:
    [无] # 当前无需调整
    
  执行动作:
    • 类型: [无]
    • 价格: [无]
    • 数量: [无]
    • 委托类型: [无]
    
  ★ 最大回撤监控: ★ 核心新增
    当前回撤: [2.5%] # (必须 ≤20%)
    警告线: 15%
    强制止损线: 20%
    应对措施: [正常] # 回撤 < 15%，正常执行
```

