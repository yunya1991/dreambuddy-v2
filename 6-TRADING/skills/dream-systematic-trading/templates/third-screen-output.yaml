## 四、最大回撤监控 ★ 核心新增#

### 4.1 最大回撤计算#

```yaml
最大回撤监控: ★ 核心新增

  回撤计算公式:
    当前回撤 = (当前权益 - 历史最高权益) / 历史最高权益 × 100%
    
    其中:
      • 当前权益 = 当前仓位市值 + 可用资金
      • 历史最高权益 = 历史上权益的最高值
      
  应对措施:
    • 回撤 < 15%: 正常执行
    • 回撤 15-20%: 触发警告，暂停加仓，仅执行止损
    • 回撤 ≥ 20%: 强制止损，全部平仓，等待下一次机会
```

### 4.2 最大回撤监控实现#

```yaml
最大回撤监控实现:

  监控频率:
    • 正常状态: 每小时计算一次
    • 警告状态: 每15分钟计算一次
    • 强制止损状态: 实时监控
    
  监控实现:
    1. 记录历史最高权益
    2. 实时计算当前权益
    3. 计算当前回撤
    4. 根据回撤值触发应对措施
    
  记录到MEMORY:
    • 每次回撤 ≥ 15%，记录到MEMORY.md
    • 每次回撤 ≥ 20%，记录到MEMORY.md + 发送告警
```

