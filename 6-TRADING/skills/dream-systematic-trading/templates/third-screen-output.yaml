## 五、模板使用流程#

### 5.1 使用步骤#

```
模板使用步骤:

  步骤1: 复制模板
    → 将本模板复制到输出文件
    
  步骤2: 填充字段
    → 将 [?] 替换为实际值
    → 删除未使用的选项（如 [是/否] → 选择其中一个）
    
  步骤3: 验证输出
    → 检查所有必填字段是否已填充
    → 检查数值是否在合理范围内
    → 检查枚举值是否合法
    → 检查最大回撤是否 ≤ 20%
    
  步骤4: 输出结果
    → 将填充后的模板作为第三屏输出
    → 执行交易（如果需要）
```

### 5.2 验证规则#

```yaml
验证规则:

  当前仓位:
    • 方向: 枚举: 多/空
    • 必填: 是
    
  最大回撤: ★ 核心新增
    • 范围: 必须 ≤ 20%
    • 必填: 是
    • 监控: 实时计算当前回撤
    
  应对措施:
    • 枚举: 正常/警告-暂停加仓/强制止损-全部平仓
    • 必填: 是
    • 触发条件:
        - 回撤 < 15%: 正常
        - 回撤 15-20%: 警告-暂停加仓
        - 回撤 ≥ 20%: 强制止损-全部平仓
```

