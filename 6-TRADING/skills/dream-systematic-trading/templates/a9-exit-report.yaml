## 四、A9 L1 止损分层执行 ★ v2.8#

### 4.1 分层执行说明#

```yaml
A9 L1 止损分层执行:

  加仓期 (Level 0-2):
    ──────────────────────────────────────────────────────────────
    止损策略:
      • 仅硬性保护止损（防止爆仓）
      • 不止盈（给市场波动空间）
      
    止损位计算:
      止损位 = 入场价 × (1 - 止损百分比)
      
      其中:
        • 弱信号: 止损百分比 = 2 × 20日波动率
        • 强信号: 止损百分比 = 1.5 × 20日波动率
        • 最大止损: 不超过20%（最大回撤约束）
        
    最大回撤监控:
      • 实时计算当前回撤
      • 回撤 ≥ 15%: 触发警告，暂停加仓
      • 回撤 ≥ 20%: 强制止损，全部平仓
    ──────────────────────────────────────────────────────────────
    
  三层加满后 (Level 3):
    ──────────────────────────────────────────────────────────────
    止损策略:
      • 启用完整止盈止损
      • 移动止盈: 盈利超10% → 移动止盈到成本价
      • 分批离场: 盈利超20%/30%/50% → 分别离场30%/30%/40%
        
    移动止盈规则:
      • 盈利超10%:
          - 移动止盈到成本价
          - 确保至少不亏损
          
      • 盈利超20%:
          - 离场30%仓位（锁定利润）
          - 剩余70%继续持有
          
      • 盈利超30%:
          - 再离场30%仓位
          - 剩余40%继续持有
          
      • 盈利超50%:
          - 离场剩余40%仓位
          - 全部平仓
          
    最大回撤监控:
      • 实时计算当前回撤
      • 回撤 ≥ 15%: 触发警告，暂停加仓
      • 回撤 ≥ 20%: 强制止损，全部平仓
    ──────────────────────────────────────────────────────────────
```

### 4.2 离场类型说明#

```yaml
离场类型:

  强制离场:
    • 触发条件: L3风险事件触发
    • 应对措施: 强制平仓，暂停交易
    • 记录: MEMORY.md + YYYY-MM-DD.md
        
  条件离场:
    • 触发条件: L1/L2信号触发
    • 应对措施: 止盈离场 或 止损离场
    • 记录: MEMORY.md + YYYY-MM-DD.md
        
  分批离场:
    • 触发条件: 盈利超20%/30%/50%
    • 应对措施: 分别离场30%/30%/40%
    • 记录: MEMORY.md + YYYY-MM-DD.md
```

