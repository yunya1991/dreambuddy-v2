## 六、最大回撤监控 ★ 核心新增#

### 6.1 最大回撤计算#

```yaml
最大回撤监控:

  回撤计算公式:
    当前回撤 = (当前权益 - 历史最高权益) / 历史最高权益 × 100%
    
    其中:
      • 当前权益 = 当前仓位市值 + 可用资金
      • 历史最高权益 = 历史上权益的最高值
      
  应对措施:
    • 回撤 < 15%: 正常执行
    • 回撤 15-20%: 触发警告，暂停加仓，仅执行止损
    • 回撤 ≥ 20%: 强制止损，全部平仓，等待下一次机会
```

### 6.2 最大回撤应对措施#

```yaml
最大回撤应对措施:

  回撤 < 15%:
    • 状态: 正常
    • 应对措施: 正常执行
    • 可以: 入场、加仓、调整止盈止损
        
  回撤 15-20%:
    • 状态: 警告
    • 应对措施: 暂停加仓，仅执行止损
    • 可以: 止损、平仓
    • 不可以: 加仓、新开仓
        
  回撤 ≥ 20%:
    • 状态: 强制止损
    • 应对措施: 强制止损，全部平仓
    • 可以: 全部平仓
    • 不可以: 任何入场、加仓、调整
    • 后续: 等待下一次机会
```

