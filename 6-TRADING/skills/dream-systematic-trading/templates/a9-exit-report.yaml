## 五、模板使用流程#

### 5.1 使用步骤#

```
模板使用步骤:

  步骤1: 复制模板
    → 将本模板复制到输出文件
    
  步骤2: 填充字段
    → 将 [?] 替换为实际值
    → 删除未使用的选项（如 [是/否] → 选择其中一个）
    
  步骤3: 验证输出
    → 检查所有必填字段是否已填充
    → 检查数值是否在合理范围内
    → 检查最大回撤是否 ≤ 20%
    
  步骤4: 输出结果
    → 将填充后的模板作为A9离场报告
    → 记录到MEMORY.md + YYYY-MM-DD.md
```

### 5.2 验证规则#

```yaml
验证规则:

  离场时间:
    • 格式: YYYY-MM-DD HH:MM:SS
    • 必填: 是
    
  离场原因:
    • 枚举: L1技术止盈止损/L2信号反转/L3风险事件/L4参数优化
    • 必填: 是
    
  最大回撤: ★ 核心新增
    • 范围: 必须 ≤ 20%
    • 必填: 是
    • 监控: 实时计算当前回撤
    
  离场类型:
    • 枚举: 强制离场/条件离场/分批离场
    • 必填: 是
    • 一致性: 必须与离场原因匹配
```

