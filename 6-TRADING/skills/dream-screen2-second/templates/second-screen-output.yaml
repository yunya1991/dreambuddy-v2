## 五、模板使用流程#

### 5.1 使用步骤

```
模板使用步骤:

  步骤1: 复制模板
    → 将本模板复制到输出文件
    
  步骤2: 填充字段
    → 将 [?] 替换为实际值
    → 删除未使用的选项（如 [是/否] → 选择其中一个）
    
  步骤3: 验证输出
    → 检查所有必填字段是否已填充
    → 检查数值是否在合理范围内
    → 检查枚举值是否合法
    → 检查最大回撤是否 ≤ 20%
    
  步骤4: 输出结果
    → 将填充后的模板作为第二屏输出
    → 传递到第三屏
```

### 5.2 验证规则

```yaml
验证规则:

  信号强度:
    • 枚举: 强信号/中信号/弱信号/无信号
    • 必填: 是
    
  实际仓位:
    • 公式: 基础仓位 × (信号强度/100) × 风险系数
    • 必填: 是
    • 范围: >0% (必须 >0%，否则无法执行)
    
  弱信号/无信号: ★ 核心修改
    • 弱信号: 30% 仓位试探（不下漏趋势）
    • 无信号: 10% 仓位试探（默认多头）
    • 不再"等待回落"
    
  最大回撤约束:
    • 固定值: ≤ 20% ★ 核心新增
    • 必填: 是
    • 监控: 实时计算当前回撤
```

