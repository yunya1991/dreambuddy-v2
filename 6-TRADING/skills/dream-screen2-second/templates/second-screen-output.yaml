## 三、模板字段说明

### 3.1 字段说明表

| 字段 | 类型 | 必填 | 说明 |
|:-----|:-----|:-----|:-----|
| **信号强度** | 枚举 | 是 | 强信号/中信号/弱信号/无信号 |
| **基础仓位** | 数值 | 是 | 合约马丁20% / 现货马丁25% |
| **信号强度值** | 数值 | 是 | 0-100 |
| **风险系数** | 数值 | 是 | 0.5-1.5 |
| **实际仓位** | 数值 | 是 | 基础仓位 × (信号强度/100) × 风险系数 |
| **最大回撤约束** | 字符串 | 是 | ≤ 20% ★ 核心新增 |
| **入场价格** | 数值 | 是 | $??,??? |
| **入场方式** | 枚举 | 是 | 市价单/限价单 |
| **仓位比例** | 数值 | 是 | 强信号100% / 中信号60% / 弱信号30% / 无信号10% |
| **默认方向** | 枚举 | 是 | 多头/空头 (无信号时默认多头) ★ 核心修改 |
| **Level 0-3** | 数值 | 是 | 加仓阶梯价位 + 仓位% |
| **止损** | 数值 | 是 | $??,??? + 最大回撤≤20% |
| **止盈** | 数值 | 是 | $??,??? |
| **可直接挂单** | 枚举 | 是 | 是/否 |
| **当前回撤** | 数值 | 是 | 必须 ≤20% ★ 核心新增 |

