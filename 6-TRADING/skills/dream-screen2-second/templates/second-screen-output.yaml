## 一、模板说明

### 1.1 用途

**此模板用于**: 第二屏（日线预设）的输出格式化

### 1.2 使用方式

```yaml
使用方式:

  1. 将模板复制到输出文件
  2. 替换所有 [?] 为实际值
  3. 删除未使用的选项（如 [是/否] → 选择其中一个）
```

