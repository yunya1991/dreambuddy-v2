## 四、弱信号不下漏趋势 ★ 核心修改

### 4.1 核心修改说明

```yaml
弱信号不下漏趋势 ★ v3.0:

  修改前:
    • 弱信号 → 等待回落 → 可能错过趋势
      
  修改后: ★
    • 弱信号 → 轻仓试探（30%仓位） → 不下漏趋势
    • 无信号 → 最小仓位试探（10%仓位） → 保持市场存在感
    • 默认多头（除非周线明确看空）
      
  仓位计算公式: ★★ 核心创新
    实际仓位 = 基础仓位 × (信号强度 / 100) × 风险系数
      
  信号强度映射:
    • 强信号(≥70): 100%
    • 中信号(50-69): 60%
    • 弱信号(<50): 30% ★ 不下漏趋势
    • 无信号: 10% ★ 默认多头
```

### 4.2 加仓阶梯规则

```yaml
加仓阶梯规则:

  强信号:
    • Level 0: 50% 总仓位
    • Level 1: 30% 总仓位
    • Level 2: 20% 总仓位
    • Level 3: 0% (不加仓)
      
  中信号:
    • Level 0: 60% 总仓位
    • Level 1: 25% 总仓位
    • Level 2: 15% 总仓位
    • Level 3: 0% (不加仓)
      
  弱信号: ★ 核心修改
    • Level 0: 100% 总仓位 (仅入场，不加仓)
    • Level 1-3: 0% (不再加仓，避免风险)
      
  无信号: ★ 核心修改
    • Level 0: 100% 总仓位 (仅试探性入场)
    • Level 1-3: 0% (不再加仓)
```

