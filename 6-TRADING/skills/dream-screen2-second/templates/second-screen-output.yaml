## 二、第二屏输出模板

### 2.1 完整模板

```yaml
第二屏输出 (日线预设):

  信号强度: [?] # [强信号/中信号/弱信号/无信号]
  
  资金管理:
    基础仓位: [?]% # 合约马丁20% / 现货马丁25%
    信号强度: [?] # [0-100]
    风险系数: [?] # [0.5-1.5]
    实际仓位: [?]% # 基础仓位 × (信号强度/100) × 风险系数
    最大回撤约束: ≤ 20% # ★ 核心新增
    
  预设1: 入场时机 ★ v3.0 核心修改
    入场价格: [$??,???]
    入场方式: [?] # [市价单/限价单]
    仓位比例: [?]% # 强信号100% / 中信号60% / 弱信号30% / 无信号10%
    默认方向: [?] # 多头/空头 (无信号时默认多头)
    
  预设2: 加仓阶梯 (最多3次)
    Level 0: [$??,???] (入场, 仓位%)
    Level 1: [$??,???] (间隔 $???, 仓位%)
    Level 2: [$??,???] (间隔 $???, 仓位%)
    Level 3: [$??,???] (间隔 $???, 极限阶梯, 仓位%)
    
  预设3: 止盈止损
    止损: [$??,???] (% + 最大回撤≤20%)
    止盈: [$??,???] (%)
    移动止盈: [盈利超10% → 移动止盈到成本价]
    分批离场: [盈利超20%/30%/50% → 分别离场30%/30%/40%]
    
  ★ 可直接挂单:
    [?] # [是/否] (预设完成即可直接挂限价单)
    
  ★ 最大回撤监控:
    当前回撤: [?]% # (必须 ≤20%)
    警告线: 15%
    强制止损线: 20%
```

### 2.2 示例填充

```yaml
第二屏输出示例 (BTC/USDT, 2026-05-16):

  信号强度: 弱信号 (35)
  
  资金管理:
    基础仓位: 20% # 合约马丁
    信号强度: 35
    风险系数: 0.7 # (波动率4.2%)
    实际仓位: 4.9% # 20% × (35/100) × 0.7
    最大回撤约束: ≤ 20% # ★ 核心新增
    
  预设1: 入场时机 ★ v3.0 核心修改
    入场价格: [$79,800]
    入场方式: 限价单试探
    仓位比例: 30% # 弱信号 → 30%
    默认方向: 多头 (除非周线明确看空)
    
  预设2: 加仓阶梯 (最多3次)
    Level 0: [$79,800] (入场, 100% 实际仓位 = 4.9%)
    Level 1: [$78,500] (间隔 $1,300, 0% 实际仓位) # 弱信号不再加仓
    Level 2: [$77,200] (间隔 $1,300, 0% 实际仓位)
    Level 3: [$75,900] (间隔 $1,300, 0% 实际仓位, 极限阶梯)
    
  预设3: 止盈止损
    止损: [$75,000] (6.1% + 最大回撤≤20%)
    止盈: [$85,000] (6.5%)
    移动止盈: 盈利超10% → 移动止盈到成本价
    分批离场: 盈利超20%/30%/50% → 分别离场30%/30%/40%
    
  ★ 可直接挂单:
    [是] # (预设完成即可直接挂限价单)
    
  ★ 最大回撤监控:
    当前回撤: [2.5%] # (必须 ≤20%)
    警告线: 15%
    强制止损线: 20%
```

