name: Agent Lifecycle Guard

on:
  pull_request:
    types: [opened, edited, synchronize, reopened, ready_for_review]
  issue_comment:
    types: [created, edited]

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  lifecycle-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build lifecycle payload
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const payload = context.payload;
            const issueNumber = payload.pull_request?.number || payload.issue?.number;
            let pr = payload.pull_request;
            if (!pr && payload.issue?.pull_request && issueNumber) {
              const prResponse = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: issueNumber
              });
              pr = prResponse.data;
            }

            const comments = [];
            if (issueNumber) {
              const issueComments = await github.paginate(
                github.rest.issues.listComments,
                {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber
                }
              );
              for (const comment of issueComments) {
                comments.push(comment.body);
              }
            }

            let reviewCount = 0;
            if (issueNumber) {
              const reviews = await github.paginate(
                github.rest.pulls.listReviews,
                {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: issueNumber
                }
              );
              reviewCount = reviews.length;
            }

            const result = {
              branch: String(pr?.head?.ref || ""),
              pr_body: pr?.body || "",
              review_count: reviewCount,
              comments
            };
            fs.writeFileSync("agent_lifecycle_raw.json", JSON.stringify(result, null, 2));

      - name: Normalize lifecycle payload
        run: python3 "AGENT协作工具/github-actions/build_agent_lifecycle_payload.py" agent_lifecycle_raw.json agent_lifecycle_payload.json

      - name: Run lifecycle checker
        run: python3 "AGENT协作工具/github-actions/check_agent_lifecycle.py" agent_lifecycle_payload.json
