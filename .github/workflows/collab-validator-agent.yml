name: collab-validator-agent

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Target PR number"
        required: true
        type: string
      task_id:
        description: "Task ID (ledger pointer)"
        required: true
        type: string
      workspace_path:
        description: "Workspace path (default 7-ARTIFACT-HUB-V2)"
        required: false
        default: "7-ARTIFACT-HUB-V2"
        type: string
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write
  pull-requests: write
  actions: write

concurrency:
  group: collab-validator-agent-${{ github.event.issue.number || inputs.pr_number }}
  cancel-in-progress: true

jobs:
  validator:
    runs-on: [self-hosted, macOS, workbuddy]
    # For issue_comment: only run on PR comments containing [协作完成回报 / DONE]
    if: >
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request != null &&
        contains(github.event.comment.body, '[协作完成回报 / DONE]')
      )
    steps:
      - name: Resolve inputs
        id: inputs
        env:
          GH_TOKEN: ${{ github.token }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "pr_number=${{ inputs.pr_number }}" >> "$GITHUB_OUTPUT"
            echo "task_id=${{ inputs.task_id }}" >> "$GITHUB_OUTPUT"
            echo "workspace_path=${{ inputs.workspace_path }}" >> "$GITHUB_OUTPUT"
          else
            PR_NUM="${{ github.event.issue.number }}"
            echo "pr_number=${PR_NUM}" >> "$GITHUB_OUTPUT"

            # Parse Task ID from comment body
            TASK_ID=$(echo "${COMMENT_BODY}" | grep -oP '(?<=Task ID:\s)[\w\-]+' | head -1)
            if [ -z "${TASK_ID}" ]; then
              TASK_ID=$(echo "${COMMENT_BODY}" | grep -oP '(?<=任务:\s)[\w\-一-鿿]+' | head -1)
            fi
            echo "task_id=${TASK_ID}" >> "$GITHUB_OUTPUT"

            # Parse Workspace Path from comment body
            WS=$(echo "${COMMENT_BODY}" | grep -oP '(?<=Workspace Path:\s)\S+' | head -1)
            if [ -z "${WS}" ]; then
              WS="7-ARTIFACT-HUB-V2"
            fi
            echo "workspace_path=${WS}" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip if task_id missing (auto-trigger only)
        if: steps.inputs.outputs.task_id == '' && github.event_name == 'issue_comment'
        run: |
          echo "No Task ID found in DONE comment, skipping validator."
          exit 0

      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Verify gh
        run: gh --version
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Resolve PR head
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.inputs.outputs.pr_number }}
        run: |
          echo "head_ref=$(gh pr view ${PR_NUMBER} --json headRefName --jq .headRefName)" >> "$GITHUB_OUTPUT"
          echo "head_sha=$(gh pr view ${PR_NUMBER} --json headRefOid --jq .headRefOid)" >> "$GITHUB_OUTPUT"

      - name: Checkout PR head
        env:
          PR_NUMBER: ${{ steps.inputs.outputs.pr_number }}
        run: |
          git fetch origin "${{ steps.pr.outputs.head_ref }}"
          git checkout -B "pr${PR_NUMBER}" "origin/${{ steps.pr.outputs.head_ref }}"

      - name: Build and test
        id: run
        env:
          WORKSPACE_PATH: ${{ steps.inputs.outputs.workspace_path }}
        run: |
          set +e
          cd "${WORKSPACE_PATH}"
          npm ci
          npm_ci_exit=$?
          npm run build
          build_exit=$?
          npm test
          test_exit=$?
          set -e

          overall=0
          if [ "$npm_ci_exit" -ne 0 ] || [ "$build_exit" -ne 0 ] || [ "$test_exit" -ne 0 ]; then
            overall=1
          fi

          echo "npm_ci_exit=$npm_ci_exit" >> "$GITHUB_OUTPUT"
          echo "build_exit=$build_exit" >> "$GITHUB_OUTPUT"
          echo "test_exit=$test_exit" >> "$GITHUB_OUTPUT"
          echo "overall=$overall" >> "$GITHUB_OUTPUT"

      - name: Post VALIDATION_RESULT comment
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.inputs.outputs.pr_number }}
          TASK_ID: ${{ steps.inputs.outputs.task_id }}
        run: |
          hard_gate="PASS"
          score="95"
          decision="ACCEPTED"
          reward_multiplier="1.0"
          reason_code="NONE"
          handoff="ledgered"
          trigger_mode="${{ github.event_name }}"

          if [ "${{ steps.run.outputs.overall }}" != "0" ]; then
            hard_gate="BLOCK"
            score="40"
            decision="REWORK"
            reward_multiplier="0.0"
            reason_code="BUILD_OR_TEST_FAILED"
            handoff="pending"
          fi

          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          {
            printf '%s\n' \
              '[验证结论 / VALIDATION_RESULT]' \
              '' \
              'Validator: collab-validator-agent' \
              "Hard Gate Result: ${hard_gate}" \
              "Score: ${score}" \
              "Decision: ${decision}" \
              'Reason Codes:' \
              "- ${reason_code}" \
              "Reward Multiplier: ${reward_multiplier}" \
              "Ledger Update: ${TASK_ID}" \
              "Governance Handoff: ${handoff}" \
              "Trigger: ${trigger_mode}" \
              '' \
              'Evidence:' \
              "- pr_number=${PR_NUMBER}" \
              "- task_id=${TASK_ID}" \
              "- head_ref=${{ steps.pr.outputs.head_ref }}" \
              "- head_sha=${{ steps.pr.outputs.head_sha }}" \
              "- actions_run=${run_url}" \
              "- npm_ci_exit=${{ steps.run.outputs.npm_ci_exit }}" \
              "- build_exit=${{ steps.run.outputs.build_exit }}" \
              "- test_exit=${{ steps.run.outputs.test_exit }}"
          } > pr_validation_result.md
          gh pr comment ${PR_NUMBER} --body-file pr_validation_result.md

      - name: Write collab context artifact
        env:
          PR_NUMBER: ${{ steps.inputs.outputs.pr_number }}
          TASK_ID: ${{ steps.inputs.outputs.task_id }}
        run: |
          {
            printf '{\n'
            printf '  "pr_number": "%s",\n' "${PR_NUMBER}"
            printf '  "task_id": "%s",\n' "${TASK_ID}"
            printf '  "head_ref": "%s",\n' "${{ steps.pr.outputs.head_ref }}"
            printf '  "head_sha": "%s"\n' "${{ steps.pr.outputs.head_sha }}"
            printf '}\n'
          } > collab_context.json

      - name: Upload collab context artifact
        uses: actions/upload-artifact@v4
        with:
          name: collab-context
          path: collab_context.json

      - name: Fail job on validation block
        if: ${{ steps.run.outputs.overall != '0' }}
        run: exit 1
